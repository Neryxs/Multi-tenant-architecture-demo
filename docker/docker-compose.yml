version: '3.9'
services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: multi_tenant_demo
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - '6379:6379'
  backend:
    build:
      context: ..
      dockerfile: ./docker/Dockerfile.backend
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/multi_tenant_demo
      REDIS_URL: redis://redis:6379
      JWT_SECRET: supersecret
      NODE_ENV: production
    depends_on:
      - db
      - redis
    ports:
      - '4000:4000'
  frontend:
    build:
      context: ..
      dockerfile: ./docker/Dockerfile.frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - backend
    ports:
      - '3000:3000'
volumes:
  db_data:
