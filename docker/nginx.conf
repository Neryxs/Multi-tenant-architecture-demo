# Nginx reverse proxy para multi-tenant
server {
    listen 80;
    server_name ~^(?<tenant>[a-z0-9-]+)\.localhost$;

    location /api/ {
        proxy_pass http://backend:4000/;
        proxy_set_header Host $host;
        proxy_set_header X-Tenant $tenant;
    }

    location / {
        proxy_pass http://frontend:3000/;
        proxy_set_header Host $host;
    }
}
