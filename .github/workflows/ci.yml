name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: multi_tenant_demo
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - name: 'Use Node.js 20.14.0'
        uses: actions/setup-node@v4
        with:
          node-version: 20.14.0
      - name: 'Show Node/NPM/Prisma versions'
        run: |
          node -v
          npm -v
          npx prisma -v
      # No cache to avoid npm/prisma corruption
      - name: Clean install root dependencies
        run: npm ci
      - name: Install frontend dependencies
        run: cd apps/frontend && npm ci
      - name: Install backend dependencies
        run: cd apps/backend && npm ci
      - name: 'Debug: ls node_modules/.prisma'
        run: ls -l node_modules/.prisma || true
      - name: 'Debug: ls node_modules/@prisma/client'
        run: ls -l node_modules/@prisma/client || true
      - name: Lint
        run: npm run lint
      - name: Prisma generate (explicit)
        run: npx prisma generate --schema=apps/backend/prisma/schema.prisma
      - name: 'Debug: ls node_modules/.prisma (after generate)'
        run: ls -l node_modules/.prisma || true
      - name: 'Debug: ls node_modules/@prisma/client (after generate)'
        run: ls -l node_modules/@prisma/client || true
      - name: Prisma migrate (deploy)
        run: npx prisma migrate deploy --schema=apps/backend/prisma/schema.prisma
      - name: Test
        run: npm run test
      - name: Build frontend
        run: npm run build:frontend
      - name: Build backend
        run: npm run build:backend
