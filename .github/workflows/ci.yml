name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/multi_tenant_demo"
      JWT_SECRET: "supersecret"
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: multi_tenant_demo
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - name: 'Use Node.js 20.19.0'
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
      # No cache to avoid npm/prisma corruption
      - name: Clean install all workspaces (root)
        run: npm ci
      - name: 'Show Node/NPM versions'
        run: |
          node -v
          npm -v
      - name: 'Show Prisma version (local)'
        run: ./node_modules/.bin/prisma -v
      - name: 'Debug: ls node_modules/.prisma'
        run: ls -l node_modules/.prisma || true
      - name: 'Debug: ls node_modules/@prisma/client'
        run: ls -l node_modules/@prisma/client || true
      - name: Lint
        run: npm run lint
      - name: Prisma generate (explicit)
        run: ./node_modules/.bin/prisma generate --schema=apps/backend/prisma/schema.prisma
      - name: 'Debug: ls node_modules/.prisma (after generate)'
        run: ls -l node_modules/.prisma || true
      - name: 'Debug: ls node_modules/@prisma/client (after generate)'
        run: ls -l node_modules/@prisma/client || true
      - name: Prisma migrate (deploy)
        run: ./node_modules/.bin/prisma migrate deploy --schema=apps/backend/prisma/schema.prisma
      - name: Test
        run: npm run test
      - name: Build frontend
        run: npm run build:frontend
      - name: Build backend
        run: npm run build:backend
